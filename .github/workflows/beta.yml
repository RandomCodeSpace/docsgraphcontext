name: Auto Beta

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  security-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: RandomCodeSpace/central-ops/.github/workflows/security.yml@main
    secrets: inherit
  auto-beta:
    if: security-scan
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-auto-beta.yml@main
    secrets: inherit
