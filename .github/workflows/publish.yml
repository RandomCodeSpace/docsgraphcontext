name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, subprocess

          tag  = os.environ["TAG"]
          repo = os.environ["REPO"]

          notes = f"""## Install

          ```bash
          go install github.com/{repo}@{tag}
          ```

          ## Build from source

          ```bash
          git clone https://github.com/{repo}.git
          cd {repo.split('/')[-1]}
          CGO_ENABLED=0 go build -o DocsContext .
          ```

          ## Quick start

          ```bash
          # Copy sample config
          mkdir -p ~/.DocsContext
          curl -sSL https://raw.githubusercontent.com/{repo}/{tag}/config.example.yaml \\
            -o ~/.DocsContext/config.yaml

          # Index documents
          DocsContext index ./your-docs/

          # Build knowledge graph (community detection)
          DocsContext index --finalize

          # Start server  (Web UI + MCP + REST API)
          DocsContext serve --port 8080
          ```

          | Endpoint | URL |
          |---|---|
          | Web UI | http://localhost:8080 |
          | MCP SSE | http://localhost:8080/mcp/sse |
          | REST API | http://localhost:8080/api/ |
          """

          with open("release_notes.md", "w") as f:
              f.write(notes)

          subprocess.run(
              ["gh", "release", "edit", tag, "--notes-file", "release_notes.md"],
              check=True
          )
          PYEOF

